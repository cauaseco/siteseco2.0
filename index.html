<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Iluminação IoT - 3 LEDs</title>
    <!-- Paho MQTT client -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f0f4f8;
            padding: 1.5rem;
        }

        .card {
            max-width: 680px;
            width: 100%;
            background: #ffffff;
            border-radius: 2.5rem;
            padding: 2rem 1.8rem 2.5rem;
            box-shadow: 0 20px 40px -12px rgba(0, 20, 40, 0.25);
            transition: box-shadow 0.2s;
        }

        /* cabeçalho */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1.8rem;
            border-bottom: 1px solid rgba(0, 40, 80, 0.06);
            padding-bottom: 0.75rem;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #0a2a44;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header h1 small {
            font-size: 0.9rem;
            font-weight: 400;
            color: #2c5778;
            background: #e9f0f8;
            padding: 0.1rem 0.9rem;
            border-radius: 30px;
            margin-left: 6px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #3b5e7a;
            background: #eef4fa;
            padding: 0.25rem 1rem;
            border-radius: 30px;
            font-weight: 450;
        }

        /* status pill */
        .status-pill {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f2f6fc;
            padding: 0.5rem 1.2rem 0.5rem 1rem;
            border-radius: 60px;
            margin: 0.5rem 0 1.8rem 0;
            width: fit-content;
            border: 1px solid rgba(0,0,0,0.02);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
        }

        .led-indicator {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #f5b342;
            box-shadow: 0 0 8px #f5b342aa;
            transition: all 0.2s ease;
        }

        .led-indicator.online {
            background: #0e9c6e;
            box-shadow: 0 0 14px #0e9c6ecc;
        }

        .led-indicator.offline {
            background: #d14c4c;
            box-shadow: 0 0 10px #d14c4cbb;
        }

        .status-text {
            font-weight: 500;
            font-size: 0.95rem;
            color: #1f3b54;
            letter-spacing: 0.2px;
        }

        .status-text.online {
            color: #0e7c5a;
        }

        .status-text.offline {
            color: #b13e3e;
        }

        /* input tópico */
        .topic-area {
            margin: 1.6rem 0 1.8rem 0;
        }

        .topic-area label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #3d627f;
            margin-bottom: 0.3rem;
        }

        .topic-input-wrapper {
            display: flex;
            align-items: center;
            background: #f4f9ff;
            border-radius: 40px;
            border: 1px solid #dde8f2;
            transition: border 0.2s, box-shadow 0.2s;
            padding: 0.1rem 0.1rem 0.1rem 1.2rem;
        }

        .topic-input-wrapper:focus-within {
            border-color: #2f7ea0;
            box-shadow: 0 0 0 3px rgba(33, 117, 155, 0.15);
            background: #ffffff;
        }

        .topic-input-wrapper input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 0.75rem 0.2rem 0.75rem 0;
            font-size: 0.95rem;
            font-weight: 450;
            color: #103249;
            outline: none;
            min-width: 0;
        }

        .topic-input-wrapper input::placeholder {
            color: #9bb2c7;
            font-weight: 400;
        }

        .topic-badge {
            background: #dce8f2;
            padding: 0.4rem 1.1rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #1a405a;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        /* LED simulator - 3 LEDs */
        .leds-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin: 1.2rem 0 2rem 0;
        }

        .led-container {
            background: #eef3f9;
            border-radius: 1.8rem;
            padding: 1.5rem 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.3s;
            border: 1px solid #dbe3ed;
        }

        .led-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #b8cbd9;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.04);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.2);
            margin-bottom: 0.6rem;
            color: #2a4b66;
            font-weight: 500;
            font-size: 0.8rem;
            letter-spacing: 0.3px;
        }

        .led-circle.active {
            background: #00b4f0;
            box-shadow: 0 0 30px #1ab2ff, 0 0 60px #1ab2ff88, 0 0 100px #00a6e0aa;
            color: #ffffff;
            text-shadow: 0 0 10px #ffffffaa;
            animation: pulse-glow 2.2s infinite alternate ease-in-out;
        }

        .led-circle.active-red {
            background: #ff3b3b;
            box-shadow: 0 0 30px #ff3b3b, 0 0 60px #ff3b3b88, 0 0 100px #ff3b3baa;
            color: #ffffff;
            text-shadow: 0 0 10px #ffffffaa;
            animation: pulse-glow-red 2.2s infinite alternate ease-in-out;
        }

        .led-circle.active-green {
            background: #00e676;
            box-shadow: 0 0 30px #00e676, 0 0 60px #00e67688, 0 0 100px #00e676aa;
            color: #ffffff;
            text-shadow: 0 0 10px #ffffffaa;
            animation: pulse-glow-green 2.2s infinite alternate ease-in-out;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 20px #00b4f0, 0 0 50px #00b4f0aa; }
            100% { box-shadow: 0 0 40px #3cc7ff, 0 0 90px #1ab2ffcc, 0 0 130px #00a6e0aa; }
        }

        @keyframes pulse-glow-red {
            0% { box-shadow: 0 0 20px #ff3b3b, 0 0 50px #ff3b3baa; }
            100% { box-shadow: 0 0 40px #ff6b6b, 0 0 90px #ff3b3bcc, 0 0 130px #ff3b3baa; }
        }

        @keyframes pulse-glow-green {
            0% { box-shadow: 0 0 20px #00e676, 0 0 50px #00e676aa; }
            100% { box-shadow: 0 0 40px #69f0ae, 0 0 90px #00e676cc, 0 0 130px #00e676aa; }
        }

        .led-label {
            font-size: 0.75rem;
            font-weight: 450;
            color: #1f405a;
            background: rgba(255,255,255,0.5);
            padding: 0.15rem 1rem;
            border-radius: 40px;
            backdrop-filter: blur(2px);
            transition: all 0.2s;
        }

        .led-label.active-text {
            color: #003957;
            background: rgba(255,255,255,0.7);
        }

        .led-name {
            font-size: 0.7rem;
            font-weight: 600;
            color: #2a4b66;
            margin-bottom: 0.4rem;
            background: rgba(255,255,255,0.4);
            padding: 0.1rem 0.8rem;
            border-radius: 20px;
        }

        /* botoes */
        .actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.8rem;
            margin-top: 0.8rem;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .btn-group-label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #3d627f;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .btn {
            border: none;
            padding: 0.6rem 0.3rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #ffffff;
            transition: all 0.2s ease;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn:disabled {
            opacity: 0.5;
            filter: grayscale(0.4);
            pointer-events: none;
            transform: none;
            box-shadow: none;
        }

        .btn-on {
            background: #1d9b7a;
            box-shadow: 0 4px 10px rgba(24, 150, 110, 0.2);
        }

        .btn-on:hover:not(:disabled) {
            background: #158a6b;
            box-shadow: 0 6px 14px rgba(24, 150, 110, 0.3);
            transform: translateY(-1px);
        }

        .btn-off {
            background: #c45c5c;
            box-shadow: 0 4px 10px rgba(185, 70, 70, 0.15);
        }

        .btn-off:hover:not(:disabled) {
            background: #b44b4b;
            box-shadow: 0 6px 14px rgba(185, 70, 70, 0.25);
            transform: translateY(-1px);
        }

        .btn:disabled {
            background: #bccbd8;
            box-shadow: none;
        }

        .btn-off:disabled, .btn-on:disabled {
            background: #bccbd8;
            box-shadow: none;
        }

        .footnote {
            margin-top: 1.6rem;
            font-size: 0.7rem;
            color: #5d7d98;
            text-align: center;
            border-top: 1px solid #e3ecf5;
            padding-top: 1.2rem;
            letter-spacing: 0.3px;
        }

        .btn-on-red {
            background: #d32f2f;
            box-shadow: 0 4px 10px rgba(211, 47, 47, 0.2);
        }

        .btn-on-red:hover:not(:disabled) {
            background: #b71c1c;
            box-shadow: 0 6px 14px rgba(211, 47, 47, 0.3);
            transform: translateY(-1px);
        }

        .btn-on-green {
            background: #2e7d32;
            box-shadow: 0 4px 10px rgba(46, 125, 50, 0.2);
        }

        .btn-on-green:hover:not(:disabled) {
            background: #1b5e20;
            box-shadow: 0 6px 14px rgba(46, 125, 50, 0.3);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
<div class="card">
    <!-- cabeçalho -->
    <div class="header">
        <h1>
            💡 Central de Iluminação IoT
            <small>3 LEDs</small>
        </h1>
        <span class="subtitle">Controle de Hardware</span>
    </div>

    <!-- status pill -->
    <div class="status-pill" id="statusPill">
        <span class="led-indicator" id="ledIndicator"></span>
        <span class="status-text" id="statusText">Sincronizando...</span>
    </div>

    <!-- input tópico -->
    <div class="topic-area">
        <label for="topicInput">📡 Tópico MQTT (edite para trocar de canal)</label>
        <div class="topic-input-wrapper">
            <input type="text" id="topicInput" value="gerry_sanchez_led_exclusivo/arduino" spellcheck="false">
            <span class="topic-badge">assinar</span>
        </div>
    </div>

    <!-- 3 LEDs preview -->
    <div class="leds-grid">
        <!-- LED 1 - Azul -->
        <div class="led-container">
            <div class="led-name">LED 1</div>
            <div class="led-circle" id="ledCircle1">⏻</div>
            <div class="led-label" id="ledLabel1">Inativo</div>
        </div>
        <!-- LED 2 - Vermelho -->
        <div class="led-container">
            <div class="led-name">LED 2</div>
            <div class="led-circle" id="ledCircle2">⏻</div>
            <div class="led-label" id="ledLabel2">Inativo</div>
        </div>
        <!-- LED 3 - Verde -->
        <div class="led-container">
            <div class="led-name">LED 3</div>
            <div class="led-circle" id="ledCircle3">⏻</div>
            <div class="led-label" id="ledLabel3">Inativo</div>
        </div>
    </div>

    <!-- botoes para cada LED -->
    <div class="actions">
        <!-- LED 1 -->
        <div class="btn-group">
            <div class="btn-group-label">LED 1</div>
            <button class="btn btn-on" id="btnOn1" disabled>🔛 LIGAR</button>
            <button class="btn btn-off" id="btnOff1" disabled>⏻ DESLIGAR</button>
        </div>
        <!-- LED 2 -->
        <div class="btn-group">
            <div class="btn-group-label">LED 2</div>
            <button class="btn btn-on-red" id="btnOn2" disabled>🔛 LIGAR</button>
            <button class="btn btn-off" id="btnOff2" disabled>⏻ DESLIGAR</button>
        </div>
        <!-- LED 3 -->
        <div class="btn-group">
            <div class="btn-group-label">LED 3</div>
            <button class="btn btn-on-green" id="btnOn3" disabled>🔛 LIGAR</button>
            <button class="btn btn-off" id="btnOff3" disabled>⏻ DESLIGAR</button>
        </div>
    </div>
    <div class="footnote">Clique envia comando · LED reage apenas via retorno do broker</div>
</div>

<script>
    (function() {
        // DOM refs
        const ledIndicator = document.getElementById('ledIndicator');
        const statusText = document.getElementById('statusText');
        const topicInput = document.getElementById('topicInput');

        // LEDs
        const leds = [
            {
                circle: document.getElementById('ledCircle1'),
                label: document.getElementById('ledLabel1'),
                btnOn: document.getElementById('btnOn1'),
                btnOff: document.getElementById('btnOff1'),
                state: '0'
            },
            {
                circle: document.getElementById('ledCircle2'),
                label: document.getElementById('ledLabel2'),
                btnOn: document.getElementById('btnOn2'),
                btnOff: document.getElementById('btnOff2'),
                state: '0'
            },
            {
                circle: document.getElementById('ledCircle3'),
                label: document.getElementById('ledLabel3'),
                btnOn: document.getElementById('btnOn3'),
                btnOff: document.getElementById('btnOff3'),
                state: '0'
            }
        ];

        // state
        let client = null;
        let currentTopic = topicInput.value.trim();
        let isOnline = false;

        // helpers UI
        function setStatus(state) {
            ledIndicator.className = 'led-indicator';
            statusText.className = 'status-text';

            if (state === 'syncing') {
                ledIndicator.style.background = '#f5b342';
                ledIndicator.style.boxShadow = '0 0 8px #f5b342aa';
                statusText.textContent = 'Sincronizando...';
                statusText.style.color = '#1f3b54';
                leds.forEach(led => {
                    led.btnOn.disabled = true;
                    led.btnOff.disabled = true;
                });
                isOnline = false;
            } else if (state === 'online') {
                ledIndicator.classList.add('online');
                statusText.classList.add('online');
                statusText.textContent = 'Sistema Online';
                leds.forEach(led => {
                    led.btnOn.disabled = false;
                    led.btnOff.disabled = false;
                });
                isOnline = true;
            } else if (state === 'offline') {
                ledIndicator.classList.add('offline');
                statusText.classList.add('offline');
                statusText.textContent = 'Desconectado';
                leds.forEach(led => {
                    led.btnOn.disabled = true;
                    led.btnOff.disabled = true;
                });
                isOnline = false;
            }
        }

        function setLedState(ledIndex, value) {
            const led = leds[ledIndex];
            if (!led) return;
            
            led.state = value;
            const circle = led.circle;
            const label = led.label;

            // Remove todas as classes de ativação
            circle.classList.remove('active', 'active-red', 'active-green');
            label.classList.remove('active-text');

            if (value === '1') {
                // Aplica a classe específica baseada no LED
                if (ledIndex === 0) {
                    circle.classList.add('active');
                } else if (ledIndex === 1) {
                    circle.classList.add('active-red');
                } else if (ledIndex === 2) {
                    circle.classList.add('active-green');
                }
                label.textContent = 'Ativo';
                label.classList.add('active-text');
            } else {
                circle.classList.remove('active', 'active-red', 'active-green');
                label.textContent = 'Inativo';
                label.classList.remove('active-text');
            }
        }

        // MQTT disconnect & clean
        function disconnectClient() {
            if (client && client.isConnected()) {
                try {
                    if (currentTopic) {
                        client.unsubscribe(currentTopic);
                    }
                    client.disconnect();
                } catch (e) { /* ignore */ }
            }
            client = null;
        }

        // connect / reconnect
        function connectBroker() {
            if (client) {
                disconnectClient();
            }

            const topic = topicInput.value.trim();
            if (!topic) {
                setStatus('offline');
                return;
            }
            currentTopic = topic;

            const clientId = 'web_' + Math.random().toString(36).substring(2, 10) + '_' + Date.now().toString(36);

            client = new Paho.MQTT.Client('broker.hivemq.com', Number(8884), clientId);

            client.onConnectionLost = function (responseObject) {
                setStatus('offline');
                setTimeout(() => {
                    if (client && !client.isConnected()) {
                        connectBroker();
                    }
                }, 3000);
            };

            client.onMessageArrived = function (message) {
                if (message.destinationName === currentTopic) {
                    const payload = message.payloadString.trim();
                    // Espera-se mensagens no formato: "1,0,1" ou "0,0,0" etc
                    const values = payload.split(',');
                    if (values.length === 3) {
                        values.forEach((val, index) => {
                            const trimmed = val.trim();
                            if (trimmed === '1' || trimmed === '0') {
                                setLedState(index, trimmed);
                            }
                        });
                    }
                }
            };

            const options = {
                useSSL: true,
                timeout: 5,
                onSuccess: function () {
                    setStatus('online');
                    if (client && client.isConnected()) {
                        client.subscribe(currentTopic, {
                            onSuccess: function() {},
                            onFailure: function() {}
                        });
                    }
                },
                onFailure: function (err) {
                    setStatus('offline');
                    setTimeout(() => {
                        if (client && !client.isConnected()) {
                            connectBroker();
                        }
                    }, 4000);
                }
            };

            try {
                client.connect(options);
                setStatus('syncing');
            } catch (e) {
                setStatus('offline');
            }
        }

        // publicar comando
        function publishCommand(value) {
            if (!client || !client.isConnected() || !isOnline) {
                connectBroker();
                return;
            }
            const topic = topicInput.value.trim();
            if (!topic) return;
            
            // Pega o estado atual de todos os LEDs
            const states = leds.map(led => led.state);
            // Atualiza o estado do LED específico
            // value é algo como "1,2" onde 1=LED index, 2=comando
            const [ledIndex, command] = value.split(',').map(v => v.trim());
            if (ledIndex !== undefined && command !== undefined) {
                states[parseInt(ledIndex)] = command;
            }
            
            // Envia todos os estados como string separada por vírgula
            const message = new Paho.MQTT.Message(states.join(','));
            message.destinationName = topic;
            client.send(message);
        }

        // Configurar botões para cada LED
        function setupButtons() {
            leds.forEach((led, index) => {
                led.btnOn.addEventListener('click', function() {
                    publishCommand(`${index},1`);
                });
                led.btnOff.addEventListener('click', function() {
                    publishCommand(`${index},0`);
                });
            });
        }

        // event: mudança de tópico
        function handleTopicChange() {
            const newTopic = topicInput.value.trim();
            if (newTopic === currentTopic) return;
            if (client && client.isConnected()) {
                disconnectClient();
                setTimeout(() => {
                    connectBroker();
                }, 50);
            } else {
                connectBroker();
            }
        }

        // inicialização
        function init() {
            setStatus('syncing');
            // Inicia todos os LEDs como inativos
            leds.forEach((_, index) => setLedState(index, '0'));

            connectBroker();
            setupButtons();

            topicInput.addEventListener('change', handleTopicChange);
            topicInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    topicInput.blur();
                    handleTopicChange();
                }
            });

            topicInput.addEventListener('blur', function() {
                if (topicInput.value.trim() !== currentTopic) {
                    handleTopicChange();
                }
            });
        }

        init();
    })();
</script>
</body>
</html>
