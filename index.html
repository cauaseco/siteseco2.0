<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia Visual de Redes para Automação</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 30px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 1000px;
            width: 100%;
            justify-content: center;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            padding: 20px;
            flex: 1;
            min-width: 300px;
            max-width: 450px;
        }

        .card h2 {
            margin-top: 0;
            color: var(--primary-color);
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        /* Estilos das Abas (Card 1) */
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }

        .tab-btn, .btn {
            background-color: #eee;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .tab-btn.active, .btn.active {
            background-color: var(--primary-color);
            color: white;
        }

        .tab-content, .top-content {
            display: none;
        }

        .tab-content.active, .top-content.active {
            display: block;
            animation: fadeIn 0.5s;
        }

        .tab-content img {
            width: 100%;
            height: auto;
            border-radius: 5px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
        }

        /* Estilos dos Botões (Card 2) */
        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn {
            flex: 1;
        }

        ul {
            padding-left: 20px;
        }

        .pro { color: green; font-weight: bold; }
        .con { color: red; font-weight: bold; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
