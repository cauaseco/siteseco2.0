<!DOCTYPE html>

<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guia Visual de Redes para Automação</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#f4f6f9;
      color:#333;
    }

    header{
      background:#0d6efd;
      color:white;
      padding:20px;
      text-align:center;
    }

    .tabs{
      display:flex;
      justify-content:center;
      background:#fff;
      box-shadow:0 2px 5px rgba(0,0,0,.15);
    }

    .tab{
      padding:15px 25px;
      cursor:pointer;
      border:none;
      background:none;
      font-size:16px;
      transition:.3s;
    }

    .tab:hover,
    .tab.active{
      background:#0d6efd;
      color:white;
    }

    .content{
      display:none;
      padding:30px;
    }

    .content.active{
      display:block;
    }

    .cards{
      display:flex;
      gap:20px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .card{
      background:white;
      width:220px;
      padding:20px;
      border-radius:10px;
      box-shadow:0 3px 8px rgba(0,0,0,.15);
      text-align:center;
      cursor:pointer;
      transition:.3s;
    }

    .card:hover{
      transform:translateY(-5px);
      background:#e9f2ff;
    }

    .info{
      margin-top:25px;
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0 3px 8px rgba(0,0,0,.15);
    }

    .buttons{
      display:flex;
      gap:15px;
      justify-content:center;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .buttons button{
      padding:12px 20px;
      border:none;
      border-radius:8px;
      background:#0d6efd;
      color:white;
      cursor:pointer;
      font-size:15px;
    }

    .buttons button:hover{
      background:#084298;
    }

    ul{
      margin-left:20px;
      margin-top:8px;
      margin-bottom:10px;
    }
  </style>

</head>

<body>

<header>
  <h1>Guia Visual de Redes para Automação</h1>
  <p>Tipos de cabos e topologias usados em ambientes industriais</p>
</header>

<div class="tabs">
  <button class="tab active" onclick="abrirAba('cabos', this)">Cabos Industriais</button>
  <button class="tab" onclick="abrirAba('topologias', this)">Topologias</button>
</div>

<!-- ABA 1 -->

<section id="cabos" class="content active">

  <div class="cards">

```
<div class="card" onclick="mostrarCabo('par')">
  <h2>Par Trançado</h2>
</div>

<div class="card" onclick="mostrarCabo('fibra')">
  <h2>Fibra Óptica</h2>
</div>

<div class="card" onclick="mostrarCabo('wireless')">
  <h2>Wireless</h2>
</div>
```

  </div>

  <div class="info" id="infoCabos">
    <h2>Selecione um cabo</h2>
    <p>Clique em um dos cards para visualizar a explicação.</p>
  </div>

</section>

<!-- ABA 2 -->

<section id="topologias" class="content">

  <div class="buttons">
    <button onclick="mostrarTopo('estrela')">Layout em Estrela</button>
    <button onclick="mostrarTopo('barramento')">Layout em Barramento</button>
  </div>

  <div class="info" id="infoTopo">
    <h2>Escolha uma topologia</h2>
    <p>Clique em um dos botões acima.</p>
  </div>

</section>

<script>

function abrirAba(id, elemento){

    document.querySelectorAll(".content").forEach(sec=>{
        sec.classList.remove("active");
    });

    document.querySelectorAll(".tab").forEach(tab=>{
        tab.classList.remove("active");
    });

    document.getElementById(id).classList.add("active");
    elemento.classList.add("active");
}

function mostrarCabo(tipo){

    const info=document.getElementById("infoCabos");

    if(tipo==="par"){
        info.innerHTML=`
        <h2>Par Trançado</h2>
        <p>É usado para conectar CLPs, computadores, IHMs e switches dentro da fábrica. É uma solução econômica para distâncias menores.</p>`;
    }

    if(tipo==="fibra"){
        info.innerHTML=`
        <h2>Fibra Óptica</h2>
        <p>É usada para ligar setores distantes da fábrica. Possui alta velocidade e não sofre interferência elétrica.</p>`;
    }

    if(tipo==="wireless"){
        info.innerHTML=`
        <h2>Wireless</h2>
        <p>É utilizado para comunicação sem fios entre equipamentos móveis, tablets industriais, sensores e coletores de dados.</p>`;
    }

}

function mostrarTopo(tipo){

    const info=document.getElementById("infoTopo");

    if(tipo==="estrela"){

        info.innerHTML=`
        <h2>Layout em Estrela</h2>

        <p>Todos os equipamentos são ligados a um equipamento central (switch).</p>

        <h3>Vantagens</h3>
        <ul>
            <li>Fácil manutenção.</li>
            <li>Falha em um cabo não afeta os demais.</li>
            <li>Boa organização da rede.</li>
        </ul>

        <h3>Desvantagens</h3>
        <ul>
            <li>Usa mais cabos.</li>
            <li>Depende do switch central.</li>
        </ul>
        `;
    }

    if(tipo==="barramento"){

        info.innerHTML=`
        <h2>Layout em Barramento</h2>

        <p>Todos os equipamentos compartilham o mesmo cabo principal.</p>

        <h3>Vantagens</h3>
        <ul>
            <li>Instalação simples.</li>
            <li>Menor quantidade de cabos.</li>
            <li>Custo reduzido.</li>
        </ul>

        <h3>Desvantagens</h3>
        <ul>
            <li>Falhas podem interromper toda a comunicação.</li>
            <li>Mais difícil localizar problemas.</li>
        </ul>
        `;
    }

}

</script>

</body>
</html>
