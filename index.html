<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Iluminação IoT</title>
    <!-- Paho MQTT client -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f0f4f8;
            padding: 1.5rem;
        }

        .card {
            max-width: 580px;
            width: 100%;
            background: #ffffff;
            border-radius: 2.5rem;
            padding: 2rem 1.8rem 2.5rem;
            box-shadow: 0 20px 40px -12px rgba(0, 20, 40, 0.25);
            transition: box-shadow 0.2s;
        }

        /* cabeçalho */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1.8rem;
            border-bottom: 1px solid rgba(0, 40, 80, 0.06);
            padding-bottom: 0.75rem;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #0a2a44;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header h1 small {
            font-size: 0.9rem;
            font-weight: 400;
            color: #2c5778;
            background: #e9f0f8;
            padding: 0.1rem 0.9rem;
            border-radius: 30px;
            margin-left: 6px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #3b5e7a;
            background: #eef4fa;
            padding: 0.25rem 1rem;
            border-radius: 30px;
            font-weight: 450;
        }

        /* status pill */
        .status-pill {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f2f6fc;
            padding: 0.5rem 1.2rem 0.5rem 1rem;
            border-radius: 60px;
            margin: 0.5rem 0 1.8rem 0;
            width: fit-content;
            border: 1px solid rgba(0,0,0,0.02);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
        }

        .led-indicator {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #f5b342;
            box-shadow: 0 0 8px #f5b342aa;
            transition: all 0.2s ease;
        }

        .led-indicator.online {
            background: #0e9c6e;
            box-shadow: 0 0 14px #0e9c6ecc;
        }

        .led-indicator.offline {
            background: #d14c4c;
            box-shadow: 0 0 10px #d14c4cbb;
        }

        .status-text {
            font-weight: 500;
            font-size: 0.95rem;
            color: #1f3b54;
            letter-spacing: 0.2px;
        }

        .status-text.online {
            color: #0e7c5a;
        }

        .status-text.offline {
            color: #b13e3e;
        }

        /* input tópico */
        .topic-area {
            margin: 1.6rem 0 1.8rem 0;
        }

        .topic-area label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #3d627f;
            margin-bottom: 0.3rem;
        }

        .topic-input-wrapper {
            display: flex;
            align-items: center;
            background: #f4f9ff;
            border-radius: 40px;
            border: 1px solid #dde8f2;
            transition: border 0.2s, box-shadow 0.2s;
            padding: 0.1rem 0.1rem 0.1rem 1.2rem;
        }

        .topic-input-wrapper:focus-within {
            border-color: #2f7ea0;
            box-shadow: 0 0 0 3px rgba(33, 117, 155, 0.15);
            background: #ffffff;
        }

        .topic-input-wrapper input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 0.75rem 0.2rem 0.75rem 0;
            font-size: 0.95rem;
            font-weight: 450;
            color: #103249;
            outline: none;
            min-width: 0;
        }

        .topic-input-wrapper input::placeholder {
            color: #9bb2c7;
            font-weight: 400;
        }

        .topic-badge {
            background: #dce8f2;
            padding: 0.4rem 1.1rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #1a405a;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        /* LED simulator */
        .led-preview {
            background: #eef3f9;
            border-radius: 2.2rem;
            padding: 1.8rem 1rem;
            margin: 1.2rem 0 2rem 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.3s;
            border: 1px solid #dbe3ed;
        }

        .led-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #b8cbd9;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.04);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.2);
            margin-bottom: 0.6rem;
            color: #2a4b66;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
        }

        .led-circle.active {
            background: #00b4f0;
            box-shadow: 0 0 30px #1ab2ff, 0 0 60px #1ab2ff88, 0 0 100px #00a6e0aa;
            color: #ffffff;
            text-shadow: 0 0 10px #ffffffaa;
            animation: pulse-glow 2.2s infinite alternate ease-in-out;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 20px #00b4f0, 0 0 50px #00b4f0aa; }
            100% { box-shadow: 0 0 40px #3cc7ff, 0 0 90px #1ab2ffcc, 0 0 130px #00a6e0aa; }
        }

        .led-label {
            font-size: 0.9rem;
            font-weight: 450;
            color: #1f405a;
            background: rgba(255,255,255,0.5);
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            backdrop-filter: blur(2px);
            transition: all 0.2s;
        }

        .led-label.active-text {
            color: #003957;
            background: rgba(255,255,255,0.7);
        }

        /* botoes */
        .actions {
            display: flex;
            gap: 1rem;
            margin-top: 0.8rem;
        }

        .btn {
            flex: 1;
            border: none;
            background: #dbe3ed;
            padding: 0.9rem 0.5rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1.1rem;
            color: #ffffff;
            transition: all 0.2s ease;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn:disabled {
            opacity: 0.5;
            filter: grayscale(0.4);
            pointer-events: none;
            transform: none;
            box-shadow: none;
        }

        .btn-on {
            background: #1d9b7a;
            box-shadow: 0 4px 10px rgba(24, 150, 110, 0.2);
        }

        .btn-on:hover:not(:disabled) {
            background: #158a6b;
            box-shadow: 0 6px 14px rgba(24, 150, 110, 0.3);
            transform: translateY(-1px);
        }

        .btn-off {
            background: #c45c5c;
            box-shadow: 0 4px 10px rgba(185, 70, 70, 0.15);
        }

        .btn-off:hover:not(:disabled) {
            background: #b44b4b;
            box-shadow: 0 6px 14px rgba(185, 70, 70, 0.25);
            transform: translateY(-1px);
        }

        .btn:disabled {
            background: #bccbd8;
            box-shadow: none;
        }

        .btn-off:disabled, .btn-on:disabled {
            background: #bccbd8;
            box-shadow: none;
        }

        .footnote {
            margin-top: 1.6rem;
            font-size: 0.7rem;
            color: #5d7d98;
            text-align: center;
            border-top: 1px solid #e3ecf5;
            padding-top: 1.2rem;
            letter-spacing: 0.3px;
        }

        /* estado bloqueado */
        .btn-blocked {
            opacity: 0.5;
        }
    </style>
</head>
<body>
<div class="card">
    <!-- cabeçalho -->
    <div class="header">
        <h1>
            💡 Central de Iluminação IoT
            <small>Porta 13</small>
        </h1>
        <span class="subtitle">Controle de Hardware</span>
    </div>

    <!-- status pill -->
    <div class="status-pill" id="statusPill">
        <span class="led-indicator" id="ledIndicator"></span>
        <span class="status-text" id="statusText">Sincronizando...</span>
    </div>

    <!-- input tópico -->
    <div class="topic-area">
        <label for="topicInput">📡 Tópico MQTT (edite para trocar de canal)</label>
        <div class="topic-input-wrapper">
            <input type="text" id="topicInput" value="gerry_sanchez_led_exclusivo/arduino" spellcheck="false">
            <span class="topic-badge">assinar</span>
        </div>
    </div>

    <!-- LED preview -->
    <div class="led-preview" id="ledPreview">
        <div class="led-circle" id="ledCircle">⏻</div>
        <div class="led-label" id="ledLabel">Dispositivo Inativo</div>
    </div>

    <!-- botoes -->
    <div class="actions">
        <button class="btn btn-on" id="btnOn" disabled>🔛 LIGAR</button>
        <button class="btn btn-off" id="btnOff" disabled>⏻ DESLIGAR</button>
    </div>
    <div class="footnote">Clique envia comando · LED reage apenas via retorno do broker</div>
</div>

<script>
    (function() {
        // DOM refs
        const ledIndicator = document.getElementById('ledIndicator');
        const statusText = document.getElementById('statusText');
        const ledCircle = document.getElementById('ledCircle');
        const ledLabel = document.getElementById('ledLabel');
        const btnOn = document.getElementById('btnOn');
        const btnOff = document.getElementById('btnOff');
        const topicInput = document.getElementById('topicInput');

        // state
        let client = null;
        let currentTopic = topicInput.value.trim();
        let isOnline = false;

        // helpers UI
        function setStatus(state) {
            // state: 'syncing', 'online', 'offline'
            ledIndicator.className = 'led-indicator';
            statusText.className = 'status-text';

            if (state === 'syncing') {
                ledIndicator.style.background = '#f5b342';
                ledIndicator.style.boxShadow = '0 0 8px #f5b342aa';
                statusText.textContent = 'Sincronizando...';
                statusText.style.color = '#1f3b54';
                btnOn.disabled = true;
                btnOff.disabled = true;
                isOnline = false;
            } else if (state === 'online') {
                ledIndicator.classList.add('online');
                statusText.classList.add('online');
                statusText.textContent = 'Sistema Online';
                btnOn.disabled = false;
                btnOff.disabled = false;
                isOnline = true;
            } else if (state === 'offline') {
                ledIndicator.classList.add('offline');
                statusText.classList.add('offline');
                statusText.textContent = 'Desconectado';
                btnOn.disabled = true;
                btnOff.disabled = true;
                isOnline = false;
            }
        }

        function setLedState(value) {
            // value: '1' ou '0' (string)
            if (value === '1') {
                ledCircle.classList.add('active');
                ledLabel.textContent = 'Dispositivo Ativo';
                ledLabel.classList.add('active-text');
            } else {
                ledCircle.classList.remove('active');
                ledLabel.textContent = 'Dispositivo Inativo';
                ledLabel.classList.remove('active-text');
            }
        }

        // MQTT disconnect & clean
        function disconnectClient() {
            if (client && client.isConnected()) {
                try {
                    if (currentTopic) {
                        client.unsubscribe(currentTopic);
                    }
                    client.disconnect();
                } catch (e) { /* ignore */ }
            }
            client = null;
        }

        // connect / reconnect
        function connectBroker() {
            // se já existe cliente, desconecta
            if (client) {
                disconnectClient();
            }

            const topic = topicInput.value.trim();
            if (!topic) {
                setStatus('offline');
                return;
            }
            currentTopic = topic;

            // gera clientId aleatório
            const clientId = 'web_' + Math.random().toString(36).substring(2, 10) + '_' + Date.now().toString(36);

            // Paho client
            client = new Paho.MQTT.Client('broker.hivemq.com', Number(8884), clientId);

            // callbacks
            client.onConnectionLost = function (responseObject) {
                setStatus('offline');
                // tenta reconectar após 3s
                setTimeout(() => {
                    if (client && !client.isConnected()) {
                        connectBroker();
                    }
                }, 3000);
            };

            client.onMessageArrived = function (message) {
                // apenas se for do tópico atual (ou se inscreveu)
                if (message.destinationName === currentTopic) {
                    const payload = message.payloadString.trim();
                    if (payload === '1' || payload === '0') {
                        setLedState(payload);
                    }
                }
            };

            // connect options
            const options = {
                useSSL: true,
                timeout: 5,
                onSuccess: function () {
                    setStatus('online');
                    // inscreve no tópico
                    if (client && client.isConnected()) {
                        client.subscribe(currentTopic, {
                            onSuccess: function() {
                                // OK
                            },
                            onFailure: function() {
                                // tenta novamente
                            }
                        });
                    }
                },
                onFailure: function (err) {
                    setStatus('offline');
                    // tenta reconectar depois
                    setTimeout(() => {
                        if (client && !client.isConnected()) {
                            connectBroker();
                        }
                    }, 4000);
                }
            };

            try {
                client.connect(options);
                setStatus('syncing');
            } catch (e) {
                setStatus('offline');
            }
        }

        // publicar comando
        function publishCommand(value) {
            if (!client || !client.isConnected() || !isOnline) {
                // tenta reconectar
                connectBroker();
                return;
            }
            const topic = topicInput.value.trim();
            if (!topic) return;
            const message = new Paho.MQTT.Message(value);
            message.destinationName = topic;
            client.send(message);
        }

        // event: mudança de tópico (reconecta e reseta inscrição)
        function handleTopicChange() {
            const newTopic = topicInput.value.trim();
            if (newTopic === currentTopic) return;
            // se estiver conectado, desconecta e reconecta (que já faz unsubscribe + subscribe)
            if (client && client.isConnected()) {
                // força desconexão limpa
                disconnectClient();
                // espera um tick e reconecta
                setTimeout(() => {
                    connectBroker();
                }, 50);
            } else {
                // se não conectado, apenas conecta
                connectBroker();
            }
        }

        // inicialização
        function init() {
            setStatus('syncing');
            // LED inicia inativo
            setLedState('0');

            // conecta
            connectBroker();

            // eventos dos botões
            btnOn.addEventListener('click', function() {
                publishCommand('1');
            });
            btnOff.addEventListener('click', function() {
                publishCommand('0');
            });

            // input topic: mudança manual (perde foco ou enter)
            topicInput.addEventListener('change', handleTopicChange);
            topicInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    topicInput.blur();
                    handleTopicChange();
                }
            });

            // se o usuário colar ou editar, mas só executa no change
            // reforço: ao perder foco se o valor mudou
            topicInput.addEventListener('blur', function() {
                if (topicInput.value.trim() !== currentTopic) {
                    handleTopicChange();
                }
            });
        }

        init();
    })();
</script>
</body>
</html>
